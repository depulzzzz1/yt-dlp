<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070f" />
      <stop offset="100%" stop-color="#020306" />
    </linearGradient>
    
    <!-- Neon Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d2ff" />
      <stop offset="50%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#00ffcc" />
    </linearGradient>

    <!-- Glyph Gradient -->
    <linearGradient id="glyphGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffcc" />
      <stop offset="100%" stop-color="#00d2ff" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Background Canvas -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Outer Neon Shield Border -->
  <rect x="24" y="24" width="464" height="464" rx="96" fill="none" stroke="url(#borderGrad)" stroke-width="8" opacity="0.85" />

  <!-- Glowing Cyber Core Graphic Group -->
  <g filter="url(#neonGlow)">
    <!-- Stylized Shield Shape -->
    <path d="M256,90 L380,140 L380,270 C380,360 256,420 256,420 C256,420 132,360 132,270 L132,140 Z" 
          fill="none" stroke="#d946ef" stroke-width="6" opacity="0.4" />
    
    <!-- Stylized Tech Down Arrow (Download Engine) -->
    <path d="M256,150 L256,310 M210,264 L256,310 L302,264" 
          fill="none" stroke="url(#glyphGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" />
          
    <!-- Cyber Concentric Waves (Network Rings) -->
    <path d="M190,170 C210,155 232,150 256,150 C280,150 302,155 322,170" 
          fill="none" stroke="#00d2ff" stroke-width="6" stroke-linecap="round" opacity="0.7" />
    <path d="M160,210 C190,190 222,180 256,180 C290,180 322,190 352,210" 
          fill="none" stroke="#00ffcc" stroke-width="6" stroke-linecap="round" opacity="0.5" />
          
    <!-- Small tech crosshair / alignment dots -->
    <circle cx="256" cy="354" r="6" fill="#00ffcc" />
    <circle cx="210" cy="115" r="3" fill="#d946ef" />
    <circle cx="302" cy="115" r="3" fill="#d946ef" />
  </g>
</svg>
